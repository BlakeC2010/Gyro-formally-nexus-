<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="500" height="500">
  <!-- Minimalist Gyroscope Logo -->
  <g transform="rotate(15 50 50)">
    <!-- Main Axis -->
    <line x1="50" y1="15" x2="50" y2="82" fill="none" stroke="#DE6A26" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Top Knob -->
    <circle cx="50" cy="12" r="3.5" fill="#DE6A26"/>
    <!-- Bottom Point -->
    <path d="M 47 80 L 53 80 L 50 92 Z" fill="#DE6A26"/>
    <!-- Center Rotor -->
    <ellipse cx="50" cy="50" rx="12" ry="6" fill="#DE6A26"/>
    <!-- Inner Ring -->
    <ellipse cx="50" cy="50" rx="26" ry="9" fill="none" stroke="#DE6A26" stroke-width="3.5" transform="rotate(-35 50 50)"/>
    <!-- Outer Ring -->
    <ellipse cx="50" cy="50" rx="42" ry="14" fill="none" stroke="#DE6A26" stroke-width="4.5" transform="rotate(25 50 50)"/>
  </g>
</svg>